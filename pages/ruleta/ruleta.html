<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruleta de Premios</title>
    <link rel="stylesheet" href="../../src/css/style.css" />
    <link rel="stylesheet" href="../../src/css/ruleta.css" />
  </head>
  <body>
    <section class="ruleta">
      <div class="ruletaDesktop">
        <div class="ruleta_contenedor">
          <div class="cabecera_contenedor">
            <img
              src="../../assets/img/icons/cabecera.png"
              alt="Cabecera"
              class="cabecera_img"
            />
          </div>

          <img
            src="../../assets/img/icons/ruleta.png"
            alt="Ruleta"
            class="ruleta_img"
          />
          <div class="premios_circulo">
            <div class="premio_contenedor premio_1">
              <img
                src="../../assets/img/icons/premioFigurita.png"
                alt="Premio Figurita"
              />
            </div>
            <div class="premio_contenedor premio_2">
              <img
                src="../../assets/img/icons/premioVacio.png"
                alt="Premio Vacío"
              />
            </div>
            <div class="premio_contenedor premio_3">
              <img
                src="../../assets/img/icons/sobreGris.png"
                alt="Sobre Gris"
              />
            </div>
            <div class="premio_contenedor premio_4">
              <img
                src="../../assets/img/icons/premioVacio.png"
                alt="Premio Vacío"
              />
            </div>
            <div class="premio_contenedor premio_5">
              <img
                src="../../assets/img/icons/sobreDorado.png"
                alt="Sobre Dorado"
              />
            </div>
            <div class="premio_contenedor premio_6">
              <img
                src="../../assets/img/icons/premioVacio.png"
                alt="Premio Vacío"
              />
            </div>
            <div class="premio_contenedor premio_7">
              <img
                src="../../assets/img/icons/giroGratis.png"
                alt="Giro Gratis"
              />
            </div>
            <div class="premio_contenedor premio_8">
              <img
                src="../../assets/img/icons/premioVacio.png"
                alt="Premio Vacío"
              />
            </div>
          </div>
        </div>

        <div class="botones_giros">
          <div class="fila_botones">
            <button class="btn_opcion">5 GIROS</button>
          </div>
          <div class="fila_botones">
            <button class="btn_opcion">10 GIROS</button>
            <button class="btn_opcion">AUTOMÁTICO</button>
          </div>
        </div>
      </div>

      <div class="btn_girar_contenedor">
        <button class="btn_girar">GIRAR</button>
      </div>
    </section>
    <script src="../js/ruleta.js"></script>
  </body>
</html>
