<div id="listar_usuarios">
  <h1>Listar Usuarios</h1>
  <h2>Listar Usuario por ID</h2>
  <p>Se puede buscar un usuario específico indicando su ID.</p>

  <form name="listar_usuario_por_id" class="form_listar">
    <div><label>Id del usuario</label></div>
    <div>
      <input type="number" name="id" required min="1" value="1" />
    </div>
    <div><button type="submit">Listar</button></div>
  </form>

  <div id="respuesta_listar_usuario_por_id"></div>
</div>
