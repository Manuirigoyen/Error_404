<div id="eliminar_usuario">
  <h1>Eliminar</h1>
  <h2>Eliminar Usuario</h2>
  <p>Se pueden eliminar usuarios por ID.</p>

  <form name="eliminar_usuario" class="form_eliminar">
    <div><label>Id del usuario</label></div>
    <div>
      <input type="number" name="id" required value="1" />
    </div>
    <div><button type="submit">Eliminar</button></div>
  </form>

  <div id="respuesta_eliminar_usuario"></div>
</div>
