<section>
  <h1>Eliminar</h1>

  <h2 id="eliminar_figurita">Eliminar Figurita</h2>
  <p>Se pueden eliminar figuritas por ID.</p>

  <form id="eliminar_figurita" class="form_eliminar">
    <div><label>Clase del sobre seleccionado</label></div>
    <div><select name="clase_sobre" class="cls_sobre"></select></div>
    <div><label>Id de la figurita</label></div>
    <div>
      <input type="number" name="id_figurita" required placeholder="1" />
    </div>
    <div><button type="submit">Eliminar</button></div>
  </form>

  <div class="respuesta_eliminar"></div>

  <h2 id="eliminar_sobre">Eliminar Sobre</h2>
  <p>Se pueden eliminar sobres por ID.</p>

  <form id="eliminar_sobre" class="form_eliminar">
    <div><label>Clase del álbum seleccionado</label></div>
    <div><select name="clase_album" class="cls_album"></select></div>
    <div><label>Id del sobre</label></div>
    <div><input type="number" name="id_sobre" required placeholder="1" /></div>
    <div><button type="submit">Eliminar</button></div>
  </form>

  <div class="respuesta_eliminar"></div>

  <h2 id="eliminar_album">Eliminar Álbum</h2>
  <p>Se pueden eliminar álbums por ID.</p>

  <form id="eliminar_album" class="form_eliminar">
    <div><label>Id del álbum seleccionado</label></div>
    <div><input type="number" name="id_album" required placeholder="1" /></div>
    <div><button type="submit">Eliminar</button></div>
  </form>

  <h2 id="eliminar_usuario">Eliminar Usuario</h2>
  <p>Se pueden eliminar usuarios por ID.</p>

  <form id="eliminar_usuario" class="form_eliminar">
    <div><label>Id del usuario seleccionado</label></div>
    <div>
      <input type="number" name="id_usuario" required placeholder="1" />
    </div>
    <div><button type="submit">Eliminar</button></div>
  </form>

  <div class="respuesta_eliminar"></div>
</section>
