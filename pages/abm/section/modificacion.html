<section>
  <h1>Modificar</h1>

  <h2 id="modificar_figurita">Modificar Figurita</h2>
  <p>Se pueden modificar figuritas.</p>

  <form name="modificar_figurita" class="form_modificar">
    <div class="grupo_campos">
      <div><label>Id de la figurita</label></div>
      <div><input type="number" name="id" required min="1" value="1" /></div>

      <div><label>Clase del sobre seleccionado</label></div>
      <div><select name="idSobre" class="cls_sobre"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Nombre de la figurita</label></div>
      <div>
        <input
          type="text"
          name="nombre"
          required
          placeholder="(nombre del jugador)"
        />
      </div>

      <div><label>Clase de figurita</label></div>
      <div><select name="claseFigurita" class="cls_figurita"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Precio de figurita</label></div>
      <div>
        <input type="number" name="precio" required min="0" value="0" />
      </div>

      <div><label>Stock disponible</label></div>
      <div><input type="number" name="stock" required min="0" value="0" /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Imagen nueva (opcional)</label></div>
      <div><input type="file" name="imagen" accept="image/*" /></div>

      <div><button type="submit">Modificar</button></div>
    </div>
  </form>

  <div id="respuesta_modificar_figurita"></div>

  <h2 id="modificar_sobre">Modificar Sobre</h2>
  <p>Se pueden modificar sobres.</p>

  <form name="modificar_sobre" class="form_modificar">
    <div class="grupo_campos">
      <div><label>Id del sobre</label></div>
      <div><input type="number" name="id" required min="1" value="1" /></div>

      <div><label>Clase del álbum seleccionado</label></div>
      <div><select name="idAlbum" class="cls_album"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Clase de sobre</label></div>
      <div><select name="claseSobre" class="cls_sobre"></select></div>

      <div><label>Stock disponible</label></div>
      <div><input type="number" name="stock" required min="0" value="0" /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Imagen nueva (opcional)</label></div>
      <div><input type="file" name="imagen" accept="image/*" /></div>

      <div><button type="submit">Modificar</button></div>
    </div>
  </form>

  <div id="respuesta_modificar_sobre"></div>

  <h2 id="modificar_album">Modificar Álbum</h2>
  <p>Se pueden modificar álbums.</p>

  <form name="modificar_album" class="form_modificar">
    <div class="grupo_campos">
      <div><label>Id del álbum</label></div>
      <div><input type="number" name="id" required min="1" value="1" /></div>

      <div><label>Nombre del país seleccionado</label></div>
      <div><select name="pais" class="cls_pais"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Clase de álbum</label></div>
      <div><select name="claseAlbum" class="cls_album"></select></div>

      <div><label>Precio del álbum</label></div>
      <div>
        <input type="number" name="precio" required min="0" value="0" />
      </div>
    </div>

    <div class="grupo_campos">
      <div><label>Stock disponible</label></div>
      <div><input type="number" name="stock" required min="0" value="0" /></div>

      <div><label>Imagen nueva (opcional)</label></div>
      <div><input type="file" name="imagen" accept="image/*" /></div>

      <div><button type="submit">Modificar</button></div>
    </div>
  </form>

  <div id="respuesta_modificar_album"></div>

  <h2 id="modificar_usuario">Modificar Usuario</h2>
  <p>Se pueden modificar usuarios.</p>

  <form name="modificar_usuario" class="form_modificar">
    <div class="grupo_campos">
      <div><label>Id del usuario</label></div>
      <div><input type="number" name="id" required min="1" value="1" /></div>

      <div><label>Nombre de usuario</label></div>
      <div><input type="text" name="nombreUsuario" required /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Contraseña</label></div>
      <div><input type="password" name="password" required /></div>

      <div><label>Correo electrónico</label></div>
      <div><input type="email" name="email" required /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Número de teléfono</label></div>
      <div><input type="tel" name="telefono" required /></div>

      <div><label>País de origen</label></div>
      <div><select name="pais" class="cls_pais"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Fecha de nacimiento</label></div>
      <div><input type="date" name="fechaNacimiento" required /></div>

      <div><label>Foto de perfil nueva (opcional)</label></div>
      <div><input type="file" name="fotoPerfil" accept="image/*" /></div>
    </div>

    <div class="grupo_campos">
      <button type="submit">Modificar</button>
    </div>
  </form>

  <div id="respuesta_modificar_usuario"></div>
</section>
