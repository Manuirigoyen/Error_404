<section>
  <h1>Agregar</h1>

  <h2 id="agregar_figurita">Agregar Figurita</h2>
  <p>Se pueden agregar figuritas indicando el sobre, la clase y sus datos.</p>

  <form id="agregar_figurita" class="form_alta">
    <div class="grupo_campos">
      <div><label>Clase del sobre seleccionado</label></div>
      <div><select name="clase_sobre" class="cls_sobre"></select></div>
      <div><label>Nombre de la figurita</label></div>
      <div>
        <input
          type="text"
          name="nombre_figurita"
          required
          placeholder="(nombre del jugador)"
        />
      </div>
    </div>

    <div class="grupo_campos">
      <div><label>Clase de figurita</label></div>
      <div><select name="clase_figurita" class="cls_figurita"></select></div>
      <div><label>Precio de figurita</label></div>
      <div>
        <input type="number" name="precio_figurita" required placeholder="0" />
      </div>
    </div>

    <div class="grupo_campos">
      <div><label>Stock disponible</label></div>
      <div>
        <input type="number" name="stock_figurita" required placeholder="0" />
      </div>
      <button type="submit">Agregar</button>
    </div>
  </form>

  <div class="respuesta_agregar"></div>

  <h2 id="agregar_sobre">Agregar Sobre</h2>
  <p>Se pueden agregar sobres indicando el álbum al que pertenecen.</p>

  <form id="agregar_sobre" class="form_alta">
    <div class="grupo_campos">
      <div><label>Clase del álbum seleccionado</label></div>
      <div><select name="clase_album" class="cls_album"></select></div>
      <div><label>Clase de sobre</label></div>
      <div><select name="clase_sobre_2" class="cls_sobre"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Stock disponible</label></div>
      <div>
        <input type="number" name="stock_sobre" required placeholder="0" />
      </div>
      <div><button type="submit">Agregar</button></div>
    </div>
  </form>

  <div class="respuesta_agregar"></div>

  <h2 id="agregar_album">Agregar Álbum</h2>
  <p>Se pueden agregar álbums indicando país y tipo.</p>

  <form id="agregar_album" class="form_alta">
    <div class="grupo_campos">
      <div><label>Nombre del país seleccionado</label></div>
      <div><select name="pais_album" class="cls_pais"></select></div>
      <div><label>Clase de álbum</label></div>
      <div><select name="clase_album_2" class="cls_album"></select></div>
    </div>

    <div class="grupo_campos">
      <div><label>Precio del álbum</label></div>
      <div>
        <input type="number" name="precio_album" required placeholder="0" />
      </div>
      <div><label>Stock disponible</label></div>
      <div>
        <input type="number" name="stock_album" required placeholder="0" />
      </div>
      <div><button type="submit">Agregar</button></div>
    </div>
  </form>

  <div class="respuesta_agregar"></div>

  <h2 id="agregar_usuario">Agregar Usuario</h2>
  <p>Se pueden agregar usuarios nuevos.</p>

  <form id="agregar_usuario" class="form_alta">
    <div class="grupo_campos">
      <div><label>Nombre de usuario</label></div>
      <div><input type="text" name="nombre_usuario" required /></div>

      <div><label>Contraseña</label></div>
      <div><input type="password" name="password_usuario" required /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Correo electrónico</label></div>
      <div><input type="email" name="email_usuario" required /></div>

      <div><label>Número de teléfono</label></div>
      <div><input type="tel" name="telefono_usuario" required /></div>
    </div>

    <div class="grupo_campos">
      <div><label>País de origen</label></div>
      <div><select name="pais_usuario" class="cls_pais"></select></div>

      <div><label>Fecha de nacimiento</label></div>
      <div><input type="date" name="fecha_nacimiento" required /></div>
    </div>

    <div class="grupo_campos">
      <div><label>Foto de perfil</label></div>
      <div>
        <input type="file" name="foto_usuario" accept="image/*" required />
      </div>
      <div><button type="submit">Agregar</button></div>
    </div>
  </form>

  <div class="respuesta_agregar"></div>
</section>
