<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil de Usuario - FigurApp</title>
    <link rel="stylesheet" href="../../src/css/style.css" />
    <link rel="stylesheet" href="../../src/css/user.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <section class="perfil_usuario">
      <div class="bienvenida">
        <h2>Datos de usuario</h2>
        <p id="usernameDisplay"></p>
        <div class="foto_perfil_wrapper">
        </div>
        <img
          src="../../assets/img/icons/btn_camara.png"
          alt="Modificar"
          class="camara_icon"
        />
      </div>

      <p>
        Gestiona tu información, la privacidad y la seguridad para mejorar tu
        experiencia en FigurApp.
      </p>

      <div class="informacion_personal">
        <div class="form_group">
          <form class="form_usuario">
            <div><label>Nombre</label></div>
            <div>
              <div>
                <input type="text" id="nameInput" placeholder="Nombre actual" />
              </div>
              <div>
                <button type="button" id="nameBtn">
                  <img
                    src="../../assets/img/icons/btn_modificar.png"
                    alt="Modificar"
                  />
                </button>
              </div>
            </div>
          </form>

          <form class="form_usuario">
            <div><label>Correo Electrónico</label></div>
            <div>
              <div>
                <input
                  type="email"
                  id="emailInput"
                  placeholder="Correo actual"
                />
              </div>
              <div>
                <button type="button" id="emailBtn">
                  <img
                    src="../../assets/img/icons/btn_modificar.png"
                    alt="Modificar"
                  />
                </button>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div><label>Número de Teléfono</label></div>
            <div>
              <div>
                <input type="tel" id="phoneInput" placeholder="Número actual" />
              </div>
              <div>
                <button type="button" id="phoneBtn">
                  <img
                    src="../../assets/img/icons/btn_modificar.png"
                    alt="Modificar"
                  />
                </button>
              </div>
            </div>
          </form>

          <form class="form_usuario">
            <div><label>País de Origen</label></div>
            <div>
              <div><select id="countrySelect"></select></div>
              <div>
                <button type="button" id="countryBtn">
                  <img
                    src="../../assets/img/icons/btn_modificar.png"
                    alt="Modificar"
                  />
                </button>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div class="form_group">
              <div><label>Contraseña Actual</label></div>
              <div>
                <input
                  type="password"
                  id="currentPasswordInput"
                  placeholder="********"
                />
              </div>
              <div>
                <div>
                  <input
                    type="password"
                    id="confirmPasswordInput"
                    placeholder="Confirmar contraseña"
                  />
                </div>
                <div>
                  <button type="button" id="confirmPasswordBtn">
                    <img
                      src="../../assets/img/icons/btn_modificar.png"
                      alt="Modificar"
                    />
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div class="form_group">
              <div><label>Fecha de Nacimiento</label></div>
              <div><div id="fechaActual">Fecha actual</div></div>
              <div>
                <div><input type="date" id="birthDateInput" /></div>
                <div>
                  <button type="button" id="birthDateBtn">
                    <img
                      src="../../assets/img/icons/btn_modificar.png"
                      alt="Modificar"
                    />
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div><label>Eliminar cuenta</label></div>
            <div>
              <div><select id="deleteReason"></select></div>
              <div>
                <button type="button" id="deleteBtn">
                  <img
                    src="../../assets/img/icons/btn_alerta.png"
                    alt="Eliminar cuenta"
                  />
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="btn_interactivos">
        <div>
          <button type="button" id="btnCartera">
            <img src="../../assets/img/icons/btn_cartera.png" alt="Cartera" />
          </button>
        </div>
        <div>
          <button type="button" id="btnAlbum">
            <img src="../../assets/img/icons/btn_album.png" alt="Álbum" />
          </button>
        </div>
        <div>
          <button type="button" id="btnRuleta">
            <img src="../../assets/img/icons/btn_ruleta.png" alt="Ruleta" />
          </button>
        </div>
      </div>
    </section>
    <script src="../../src/js/user.js"></script>
  </body>
</html>
