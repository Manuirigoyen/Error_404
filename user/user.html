<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil de Usuario - FigurApp</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="user.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <section class="perfil_usuario">
      <div class="bienvenida">
        <h2>Datos de usuario</h2>
        <p id="usernameDisplay"></p>
        <div class="foto_perfil_wrapper">
          <img
            src="../img/icons/fotoPerfilDefault.png"
            alt="Foto de perfil"
            class="foto_perfil"
          />
        </div>
        <img
          src="../img/icons/btn_camara.png"
          alt="Modificar"
          class="camara_icon"
        />
      </div>

      <p>
        Gestiona tu información, la privacidad y la seguridad para mejorar tu
        experiencia en FigurApp.
      </p>

      <div class="informacion_personal">
        <div class="form_group">
          <form class="form_usuario">
            <label>Nombre</label>
            <div>
              <input type="text" id="nameInput" placeholder="Nombre actual" />
              <button type="button" id="nameBtn">
                <img src="../img/icons/btn_modificar.png" alt="Modificar" />
              </button>
            </div>
          </form>

          <form class="form_usuario">
            <label>Correo Electrónico</label>
            <div>
              <input type="email" id="emailInput" placeholder="Correo actual" />

              <button type="button" id="emailBtn">
                <img src="../img/icons/btn_modificar.png" alt="Modificar" />
              </button>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <label>Número de Teléfono</label>
            <div>
              <input type="tel" id="phoneInput" placeholder="Número actual" />

              <button type="button" id="phoneBtn">
                <img src="../img/icons/btn_modificar.png" alt="Modificar" />
              </button>
            </div>
          </form>

          <form class="form_usuario">
            <label>País de Origen</label>
            <div>
              <select id="countrySelect"></select>

              <button type="button" id="countryBtn">
                <img src="../img/icons/btn_modificar.png" alt="Modificar" />
              </button>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div class="form_group">
              <label>Contraseña Actual</label>
              <div>
                <input
                  type="password"
                  id="currentPasswordInput"
                  placeholder="********"
                />
              </div>
              <div>
                <input
                  type="password"
                  id="confirmPasswordInput"
                  placeholder="Confirmar contraseña"
                />
                <button type="button" id="confirmPasswordBtn">
                  <img src="../img/icons/btn_modificar.png" alt="Modificar" />
                </button>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <div class="form_group">
              <label>Fecha de Nacimiento</label>
              <div>
                <div id="fechaActual">Fecha actual</div>
              </div>
              <div>
                <input type="date" id="birthDateInput" />
                <button type="button" id="birthDateBtn">
                  <img src="../img/icons/btn_modificar.png" alt="Modificar" />
                </button>
              </div>
            </div>
          </form>
        </div>

        <div class="form_group">
          <form class="form_usuario">
            <label>Eliminar cuenta</label>
            <div>
              <select id="deleteReason"></select>

              <button type="button" id="deleteBtn">
                <img src="../img/icons/btn_alerta.png" alt="Eliminar cuenta" />
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="btn_interactivos">
        <div>
          <button type="button" id="btnCartera">
            <img src="../img/icons/btn_cartera.png" alt="Cartera" />
          </button>
        </div>
        <div>
          <button type="button" id="btnAlbum">
            <img src="../img/icons/btn_album.png" alt="Álbum" />
          </button>
        </div>
        <div>
          <button type="button" id="btnRuleta">
            <img src="../img/icons/btn_ruleta.png" alt="Ruleta" />
          </button>
        </div>
      </div>
    </section>
    <script src="js/user.js"></script>
  </body>
</html>
